name: Validate TFM2 Database

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"

      - name: Run database preflight
        shell: pwsh
        run: |
          $baseRef = ""
          if ("${{ github.event_name }}" -eq "pull_request") {
            $baseRef = "${{ github.event.pull_request.base.sha }}"
          } elseif ("${{ github.event.before }}" -and "${{ github.event.before }}" -ne "0000000000000000000000000000000000000000") {
            $baseRef = "${{ github.event.before }}"
          }

          ./tools/preflight.ps1 -BaseRef $baseRef